<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat · PICKUP</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body { display: flex; flex-direction: column; height: 100vh; padding-bottom: 0; overflow: hidden; }
    .top-bar { flex-shrink: 0; }
    .top-bar-info { flex: 1; }
    .top-bar-title { font-size: 16px; font-weight: 700; }
    .top-bar-sub   { font-size: 12px; color: var(--text-muted); }
    .completed-banner { background: #FFF3CD; color: #856404; padding: 10px 16px; font-size: 13px; font-weight: 600; text-align: center; flex-shrink: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .empty-chat { text-align: center; color: var(--text-muted); font-size: 14px; margin: auto; padding: 40px 20px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.mine { flex-direction: row-reverse; }
    .msg-avatar { font-size: 20px; flex-shrink: 0; width: 36px; height: 36px; background: var(--orange-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .msg-body { max-width: 70%; }
    .msg-meta  { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .msg.mine .msg-meta { text-align: right; }
    .msg-bubble { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 14px; line-height: 1.4; }
    .msg.mine .msg-bubble { background: var(--orange); color: white; border-color: var(--orange); }
    .input-bar { background: var(--white); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
    .msg-input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 14px; font-family: inherit; outline: none; }
    .msg-input:focus { border-color: var(--orange); }
    .send-btn { background: var(--orange); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:hover { background: var(--orange-dark); }
  </style>
</head>
<body>
<header class="top-bar">
  <a id="backBtn" href="explore.html" class="back-btn">‹</a>
  <div class="top-bar-info">
    <div class="top-bar-title" id="chatTitle">Chat</div>
    <div class="top-bar-sub"  id="chatSub"></div>
  </div>
</header>
<div id="completedBanner" class="completed-banner hidden">This event has been completed — chat is closed.</div>
<div class="messages" id="messageList">
  <div class="empty-chat">Loading messages…</div>
</div>
<div class="input-bar" id="inputBar">
  <input type="text" id="msgInput" class="msg-input" placeholder="Say something…" autocomplete="off"/>
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const eventId = params.get('id');
  let currentPlayer = null;
  let eventData = null;

  document.getElementById('backBtn').href = 'event.html?id=' + eventId;

  auth.onAuthStateChanged(async (firebaseUser) => {
    if (!firebaseUser) { window.location.href = 'login.html'; return; }
    if (!eventId) { location.href = 'explore.html'; return; }

    const pSnap = await db.collection('players').doc(firebaseUser.uid).get();
    currentPlayer = pSnap.exists ? { id: pSnap.id, ...pSnap.data() } : { id: firebaseUser.uid, name: firebaseUser.email.split('@')[0], avatar: '🏅' };

    const eSnap = await db.collection('events').doc(eventId).get();
    if (!eSnap.exists) { location.href = 'explore.html'; return; }
    eventData = { id: eSnap.id, ...eSnap.data() };

    document.getElementById('chatTitle').textContent = eventData.title;
    document.getElementById('chatSub').textContent   = eventData.sport + ' · ' + eventData.location;
    document.title = eventData.title + ' · Chat';

    if (eventData.completed) {
      document.getElementById('completedBanner').classList.remove('hidden');
      document.getElementById('inputBar').innerHTML = '<div style="flex:1;padding:10px;font-size:13px;color:var(--text-muted);text-align:center;">Chat is closed — this event is completed.</div>';
    }

    // Real-time messages
    db.collection('events').doc(eventId).collection('messages')
      .orderBy('createdAt')
      .onSnapshot(snap => {
        const msgs = snap.docs.map(d => d.data());
        const list = document.getElementById('messageList');
        if (msgs.length === 0) {
          list.innerHTML = '<div class="empty-chat">No messages yet.<br/>Be the first to say something!</div>';
          return;
        }
        list.innerHTML = msgs.map(msg => {
          const mine = currentPlayer && msg.senderName === currentPlayer.name;
          return `<div class="msg ${mine?'mine':''}">
            <div class="msg-avatar">${msg.senderAvatar||'🏅'}</div>
            <div class="msg-body">
              <div class="msg-meta">${msg.senderName} · ${msg.timestamp||''}</div>
              <div class="msg-bubble">${msg.text}</div>
            </div>
          </div>`;
        }).join('');
        list.scrollTop = list.scrollHeight;
      });

    document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  });

  async function sendMessage() {
    if (!currentPlayer || !eventData || eventData.completed) return;
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    const now = new Date();
    await db.collection('events').doc(eventId).collection('messages').add({
      senderName:   currentPlayer.name,
      senderAvatar: currentPlayer.avatar || '🏅',
      text,
      timestamp: now.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true }),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  }
</script>
</body>
</html>
