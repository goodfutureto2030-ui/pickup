<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In · PICKUP</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body { display: flex; flex-direction: column; align-items: center;
           justify-content: center; min-height: 100vh; padding: 24px 16px; padding-bottom: 24px; }
    .logo-area { text-align: center; margin-bottom: 28px; }
    .logo-text  { font-size: 28px; font-weight: 800; color: var(--orange); }
    .logo-sub   { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .auth-card  { background: var(--white); border: 1px solid var(--border);
                  border-radius: var(--radius); padding: 28px 24px;
                  width: 100%; max-width: 400px; }
    .auth-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .pw-wrapper { position: relative; }
    .pw-wrapper .form-input { padding-right: 44px; }
    .pw-toggle  { position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
                  background: none; border: none; cursor: pointer; padding: 4px;
                  color: var(--text-muted); display: flex; align-items: center; }
    .pw-toggle:hover { color: var(--orange); }
    .pin-hint { display: flex; align-items: center; gap: 6px;
                background: var(--orange-bg); border: 1px solid rgba(200,84,26,.22);
                border-radius: 8px; padding: 8px 12px; margin-top: 8px;
                font-size: 12px; font-weight: 600; color: var(--orange); }
    .ip-notice { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 10px; }
    .divider { text-align: center; color: var(--text-muted); font-size: 13px;
               margin: 18px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%;
      width: 42%; height: 1px; background: var(--border); }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .bottom-link { text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 14px; }
    .bottom-link a { color: var(--orange); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>

<div class="logo-area">
  <img src="pickup-icon.png" style="height:36px;" alt="PICKUP"/>
  <div class="logo-text">PICKUP</div>
  <div class="logo-sub">Find pickup sports near campus</div>
</div>

<div class="auth-card">
  <h2>Welcome back</h2>
  <div id="flash" class="flash-error hidden"></div>

  <div class="form-group">
    <label class="form-label" for="email">Email</label>
    <input type="email" id="email" class="form-input"
           placeholder="you@school.edu" autocomplete="email"/>
  </div>

  <div class="form-group">
    <label class="form-label" for="password">Password / School PIN</label>
    <div class="pw-wrapper">
      <input type="password" id="password" class="form-input"
             placeholder="Enter your school PIN" autocomplete="current-password"/>
      <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Show/hide password">
        <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <div class="pin-hint">🔐 Use your school PIN number as your password</div>
  </div>

  <button class="btn btn-primary" onclick="doLogin()">Log In →</button>
  <p class="ip-notice">🔒 Your IP address is recorded for school security purposes</p>

  <div class="divider">or</div>
  <a href="signup.html" class="btn btn-secondary" style="display:block;text-align:center;padding:14px;border-radius:var(--radius-sm);font-size:16px;font-weight:700;text-decoration:none;color:var(--text);border:1.5px solid var(--border);">Create Account</a>
  <div class="bottom-link" style="margin-top:14px;">
    Don't have an account? <a href="signup.html">Sign up</a>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script>
  // If already logged in, go straight to home
  auth.onAuthStateChanged(u => { if (u) window.location.href = 'index.html'; });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const flash = document.getElementById('flash');
    flash.classList.add('hidden');
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      window.location.href = 'index.html';
    } catch (e) {
      flash.textContent = 'Login failed: ' + (e.message || 'Check your email and password.');
      flash.className = 'flash-error';
      flash.classList.remove('hidden');
    }
  }

  function togglePw() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
