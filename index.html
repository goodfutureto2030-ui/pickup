<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home · PICKUP</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .top-bar { justify-content: space-between; }
    .hero { color: white; text-align: left; }
    .hero h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .hero p  { font-size: 14px; opacity: .88; }
    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
    .stat-tile  { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; }
    .stat-number { font-size: 24px; font-weight: 700; color: var(--orange); }
    .stat-label  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .section-header { font-size: 20px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .section-header a { font-size: 14px; color: var(--orange); text-decoration: none; font-weight: 500; }
    .your-events { background: var(--orange-bg); border: 1px solid rgba(200,84,26,.2); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
    .your-events h3 { font-size: 15px; font-weight: 600; color: var(--orange); margin-bottom: 12px; }
    .mini-event { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(200,84,26,.1); cursor: pointer; }
    .mini-event:last-child { border-bottom: none; }
    .mini-event-info { font-size: 13px; font-weight: 500; }
    .mini-event-time { font-size: 12px; color: var(--text-muted); }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-icon  { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

<header class="top-bar">
  <a href="index.html" class="back-btn">‹</a>
  <img src="pickup-icon.png" style="height:36px;" alt="PICKUP"/>
</header>

<main class="page">
  <div id="flash" class="flash-success hidden"></div>

  <div class="hero-gradient hero" id="hero">
    <h1>Hey, <span id="firstName">there</span>!</h1>
    <p id="heroSub">Loading events near school...</p>
  </div>

  <div class="stats-grid">
    <div class="stat-tile"><div class="stat-number" id="statUpcoming">–</div><div class="stat-label">Events</div></div>
    <div class="stat-tile"><div class="stat-number" id="statJoined">–</div><div class="stat-label">Joined</div></div>
    <div class="stat-tile"><div class="stat-number" id="statSports">–</div><div class="stat-label">My Sports</div></div>
  </div>

  <div class="your-events hidden" id="yourEventsBox">
    <h3>📅 Your Upcoming Events</h3>
    <div id="yourEventsList"></div>
  </div>

  <div class="section-header">
    All Upcoming Events
    <a href="explore.html">See all →</a>
  </div>
  <div id="loading" class="loading"><div class="spinner"></div>Loading events…</div>
  <div id="eventsList"></div>
</main>

<nav class="bottom-nav" id="bottom-nav"></nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script>
  auth.onAuthStateChanged(async (firebaseUser) => {
    if (!firebaseUser) {
      window.location.href = 'login.html';
      return;
    }

    buildNav('Home');

    // Get or create player doc
    let player = null;
    try {
      player = await getOrCreatePlayer(firebaseUser);
    } catch(e) {
      console.error('Player load error:', e);
      document.getElementById('loading').innerHTML = '<p style="color:red;text-align:center;">Error loading data. Check console.</p>';
      return;
    }

    document.getElementById('firstName').textContent = (player.name || '').split(' ')[0] || 'there';
    document.getElementById('statSports').textContent = (player.favoriteSports || []).length;

    // Load events safely without compound index
    try {
      const snap = await db.collection('events').get();
      const now = new Date();
      const events = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(e => !e.completed && e.dateTime && new Date(e.dateTime) >= now)
        .sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime))
        .slice(0, 20);

      const userEvents = events.filter(e => (e.joinedPlayerIds || []).includes(player.id));

      document.getElementById('statUpcoming').textContent = events.length;
      document.getElementById('statJoined').textContent = userEvents.length;
      document.getElementById('heroSub').textContent = `Ready to play? There are ${events.length} events happening near school.`;

      if (userEvents.length) {
        document.getElementById('yourEventsBox').classList.remove('hidden');
        document.getElementById('yourEventsList').innerHTML = userEvents.map(e => `
          <div class="mini-event" onclick="location.href='event.html?id=${e.id}'">
            <span style="font-size:20px;">${sportEmoji(e.sport)}</span>
            <div>
              <div class="mini-event-info">${e.title}</div>
              <div class="mini-event-time">${formatDateTime(e.dateTime)}</div>
            </div>
          </div>`).join('');
      }

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('eventsList').innerHTML = events.length === 0
        ? `<div class="empty-state"><div class="empty-icon">🏅</div><h3>No events yet!</h3><p style="margin-bottom:20px;">Be the first to create a pickup game.</p><a href="create.html" class="btn btn-primary" style="width:auto;display:inline-block;padding:12px 32px;">Create an Event</a></div>`
        : events.map(eventCardHTML).join('');

    } catch(e) {
      console.error('Events load error:', e);
      document.getElementById('loading').innerHTML = '<p style="color:red;text-align:center;">Error loading events.</p>';
    }
  });
</script>
</body>
</html>
